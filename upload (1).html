window.upload = async function() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Проверяю Firebase…';
  log.innerHTML = '';

  // Get existing IDs from Firebase
  const snap = await getDocs(collection(db, 'recipes'));
  const existingIds = new Set(snap.docs.map(d => d.id));

  const toUpload = recipes.filter(r => !existingIds.has(r.id));
  const toSkip = recipes.filter(r => existingIds.has(r.id));

  log.innerHTML += `<div class="skip">📋 Уже в Firebase: ${toSkip.length} рецептов — не трогаем</div>`;
  log.innerHTML += `<div class="ok">🆕 Нужно добавить: ${toUpload.length} рецептов</div><br>`;

  if (!toUpload.length) {
    btn.textContent = '✅ Всё уже загружено!';
    return;
  }

  btn.textContent = 'Загружаю…';
  let ok = 0, err = 0;

  for (const recipe of toUpload) {
    try {
      await setDoc(doc(collection(db, 'recipes'), recipe.id), recipe);
      log.innerHTML += `<div class="ok">✓ ${recipe.title}</div>`;
      ok++;
    } catch(e) {
      log.innerHTML += `<div class="err">✗ ${recipe.title}: ${e.message}</div>`;
      err++;
    }
  }

  log.innerHTML += `<div class="summary">🎉 Готово! Добавлено: ${ok}, ошибок: ${err}</div>`;
  btn.textContent = 'Готово!';
};
</script>

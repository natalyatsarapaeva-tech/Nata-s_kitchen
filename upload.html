window.upload = async function() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Загружаю...';
  let ok = 0, err = 0;

  for (const recipe of recipes) {
    try {
      await setDoc(doc(collection(db, 'recipes'), recipe.id), recipe);
      log.innerHTML += `<div class="ok">✓ ${recipe.title}</div>`;
      ok++;
    } catch(e) {
      log.innerHTML += `<div class="err">✗ ${recipe.title}: ${e.message}</div>`;
      err++;
    }
  }

  btn.textContent = `Готово! ${ok} загружено, ${err} ошибок`;
  if (!err) log.innerHTML += '<div class="ok"><strong>🎉 Все рецепты в Firebase!</strong></div>';
};

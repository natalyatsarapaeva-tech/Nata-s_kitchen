<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Мои рецепты">
  <title>Мои рецепты</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fdf6ec; --warm: #f5e6d0; --brown: #5c3d2e;
      --brown-light: #8b6355; --amber: #d4843a; --amber-light: #e8a85f;
      --text: #2e1f14; --text-soft: #7a5c4a; --white: #fff;
      --shadow: rgba(92,61,46,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Lato',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; overflow-x:hidden; }

    /* HOME */
    #home { display:flex; flex-direction:column; min-height:100vh; }
    .home-header { background:var(--brown); padding:56px 24px 32px; position:relative; overflow:hidden; }
    .home-header::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%; background:var(--amber); opacity:.15; }
    .home-header::after { content:''; position:absolute; bottom:-40px; left:-40px; width:140px; height:140px; border-radius:50%; background:var(--amber-light); opacity:.12; }
    .home-title { font-family:'Playfair Display',serif; font-size:34px; color:var(--cream); line-height:1.2; position:relative; z-index:1; }
    .home-title em { color:var(--amber-light); font-style:italic; }
    .home-subtitle { color:var(--warm); font-size:13px; font-weight:300; margin-top:6px; letter-spacing:.05em; position:relative; z-index:1; }

    /* SEARCH */
    .search-wrap { padding:16px 20px 4px; }
    .search-box {
      width:100%; padding:12px 16px 12px 42px; border-radius:14px;
      border:2px solid var(--warm); background:var(--white); font-family:'Lato',sans-serif;
      font-size:15px; color:var(--text); outline:none; position:relative;
    }
    .search-box:focus { border-color:var(--amber); }
    .search-wrap-inner { position:relative; }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
    .search-clear { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; color:var(--text-soft); cursor:pointer; display:none; padding:4px; }

    /* TABS */
    .filter-tabs { display:flex; gap:8px; padding:14px 20px 4px; overflow-x:auto; scrollbar-width:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .tab { flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:12px; font-family:'Lato',sans-serif; font-weight:700; cursor:pointer; border:2px solid var(--warm); background:transparent; color:var(--text-soft); transition:all .2s; white-space:nowrap; }
    .tab.active { background:var(--brown); color:var(--cream); border-color:var(--brown); }

    /* CARDS */
    .cards-grid { padding:14px 20px 40px; display:flex; flex-direction:column; gap:12px; flex:1; }
    .no-results { text-align:center; padding:40px 20px; color:var(--text-soft); font-size:15px; }

    .recipe-card {
      background:var(--white); border-radius:18px; padding:18px 18px 18px 22px;
      display:flex; align-items:center; gap:14px; box-shadow:0 3px 16px var(--shadow);
      cursor:pointer; transition:transform .2s,box-shadow .2s; position:relative;
      overflow:hidden; border:none; width:100%; text-align:left;
    }
    .recipe-card:active { transform:scale(.98); box-shadow:0 2px 8px var(--shadow); }
    .recipe-card::before { content:''; position:absolute; top:0; left:0; width:5px; height:100%; background:var(--amber); border-radius:18px 0 0 18px; }
    .card-emoji { font-size:42px; line-height:1; flex-shrink:0; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-family:'Playfair Display',serif; font-size:18px; color:var(--brown); font-weight:700; line-height:1.2; }
    .card-meta { font-size:12px; color:var(--text-soft); margin-top:3px; font-weight:300; }
    .card-arrow { color:var(--amber); font-size:18px; flex-shrink:0; }

    /* RECIPE SCREEN */
    #recipe-screen { display:none; min-height:100vh; flex-direction:column; }
    .recipe-header { background:var(--brown); padding:52px 24px 28px; }
    .back-btn { display:flex; align-items:center; gap:8px; color:var(--amber-light); font-size:14px; font-weight:400; letter-spacing:.05em; cursor:pointer; background:none; border:none; padding:0; margin-bottom:18px; font-family:'Lato',sans-serif; }
    .recipe-emoji-big { font-size:56px; display:block; margin-bottom:10px; }
    .recipe-title-big { font-family:'Playfair Display',serif; font-size:28px; color:var(--cream); line-height:1.2; }
    .recipe-yield { font-size:12px; color:var(--amber-light); margin-top:5px; font-weight:300; letter-spacing:.08em; text-transform:uppercase; }
    .recipe-body { padding:24px 20px; flex:1; }
    .section-label { font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:var(--amber); font-weight:700; margin-bottom:12px; }
    .ingredients-box { background:var(--white); border-radius:14px; padding:18px; margin-bottom:24px; box-shadow:0 2px 10px var(--shadow); }
    .ingredient-item { display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--warm); font-size:14px; gap:8px; }
    .ingredient-item:last-child { border-bottom:none; }
    .ingredient-name { color:var(--text); font-weight:400; flex:1; }
    .ingredient-amount { color:var(--brown-light); font-weight:700; font-size:13px; text-align:right; }
    .ingredient-divider { padding:10px 0 4px; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--amber); font-weight:700; border-bottom:1px solid var(--warm); }
    .steps-list { display:flex; flex-direction:column; gap:12px; margin-bottom:40px; }
    .step-item { background:var(--white); border-radius:14px; padding:16px; box-shadow:0 2px 10px var(--shadow); display:flex; gap:12px; align-items:flex-start; }
    .step-num { background:var(--amber); color:var(--white); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:1px; }
    .step-text { font-size:14px; line-height:1.65; color:var(--text); }
    .note-box { background:var(--warm); border-radius:12px; padding:12px 14px; margin-bottom:20px; font-size:13px; line-height:1.6; color:var(--brown); border-left:4px solid var(--amber); }

    /* ANIM */
    .fade-in { animation:fadeIn .3s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .stagger>*{opacity:0;animation:fadeIn .35s ease both;}
    .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.07s}.stagger>*:nth-child(3){animation-delay:.11s}
    .stagger>*:nth-child(4){animation-delay:.15s}.stagger>*:nth-child(5){animation-delay:.19s}.stagger>*:nth-child(6){animation-delay:.23s}
    .stagger>*:nth-child(7){animation-delay:.27s}.stagger>*:nth-child(8){animation-delay:.31s}.stagger>*:nth-child(9){animation-delay:.35s}
    .stagger>*:nth-child(10){animation-delay:.39s}.stagger>*:nth-child(11){animation-delay:.43s}.stagger>*:nth-child(12){animation-delay:.47s}
    .stagger>*:nth-child(13){animation-delay:.51s}.stagger>*:nth-child(14){animation-delay:.55s}.stagger>*:nth-child(15){animation-delay:.59s}
    .stagger>*:nth-child(16){animation-delay:.63s}.stagger>*:nth-child(17){animation-delay:.67s}.stagger>*:nth-child(18){animation-delay:.71s}
    .stagger>*:nth-child(19){animation-delay:.75s}.stagger>*:nth-child(20){animation-delay:.79s}
  </style>
</head>
<body>

<div id="home">
  <div class="home-header">
    <div class="home-title">Моя кухня<br><em>любимое</em></div>
    <div class="home-subtitle" id="count-label">82 рецепта</div>
  </div>

  <div class="search-wrap">
    <div class="search-wrap-inner">
      <span class="search-icon">🔍</span>
      <input class="search-box" type="text" placeholder="Ингредиент или блюдо..." id="search-input" oninput="onSearch()" />
      <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
    </div>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <button class="tab active" onclick="filterCards('all',event)">Все</button>
    <button class="tab" onclick="filterCards('breakfast',event)">🌅 Завтраки</button>
    <button class="tab" onclick="filterCards('soup',event)">🍲 Супы</button>
    <button class="tab" onclick="filterCards('salad',event)">🥗 Салаты</button>
    <button class="tab" onclick="filterCards('veggie',event)">🥦 Овощи</button>
    <button class="tab" onclick="filterCards('meat',event)">🥩 Мясо</button>
    <button class="tab" onclick="filterCards('chicken',event)">🍗 Курица</button>
    <button class="tab" onclick="filterCards('fish',event)">🐟 Рыба</button>
    <button class="tab" onclick="filterCards('pasta',event)">🍝 Паста</button>
    <button class="tab" onclick="filterCards('baking',event)">🧁 Выпечка</button>
    <button class="tab" onclick="filterCards('dessert',event)">🍮 Десерты</button>
    <button class="tab" onclick="filterCards('icecream',event)">🍦 Мороженое</button>
  </div>

  <div class="cards-grid stagger" id="cards-grid"></div>
</div>

<div id="recipe-screen">
  <div class="recipe-header">
    <button class="back-btn" onclick="goBack()">← Все рецепты</button>
    <span class="recipe-emoji-big" id="r-emoji"></span>
    <div class="recipe-title-big" id="r-title"></div>
    <div class="recipe-yield" id="r-yield"></div>
  </div>
  <div class="recipe-body">
    <div id="r-note-wrap"></div>
    <div class="section-label">Ингредиенты</div>
    <div class="ingredients-box stagger" id="r-ingredients"></div>
    <div class="section-label">Приготовление</div>
    <div class="steps-list stagger" id="r-steps"></div>
  </div>
</div>

<script>
const recipes = [
  // ═══ ЗАВТРАКИ ═══
  { id:'waffles', emoji:'🧇', title:'Творожные вафли', meta:'~20 мин', yield:'6–8 вафель', tags:['breakfast'],
    ingredients:[{n:'Творог',a:'300 г'},{n:'Яйца',a:'3 шт'},{n:'Сливочное масло',a:'70 г'},{n:'Молоко',a:'70 г'},{n:'Мука',a:'170 г'},{n:'Сахар',a:'3 ч. л.'},{n:'Соль',a:'½ ч. л.'},{n:'Разрыхлитель',a:'1 ч. л. (без горки)'}],
    steps:['Растопить масло, немного остудить.','Смешать творог, яйца, молоко и масло.','Добавить муку, сахар, соль, разрыхлитель — не перебивать.','Выпекать в разогретой вафельнице 3–5 мин до золотистого цвета.'] },

  { id:'pancakes', emoji:'🥞', title:'Заварные блинчики', meta:'25 штук', yield:'на 25 блинчиков', tags:['breakfast'],
    ingredients:[{n:'Яйца',a:'4 шт'},{n:'Соль',a:'1 ч. л.'},{n:'Сахар',a:'2 ст. л.'},{n:'Мука',a:'240 г'},{n:'Молоко тёплое',a:'500 мл'},{n:'Кипяток',a:'300 мл'},{n:'Растительное масло',a:'4 ст. л.'},{n:'Жир для сковороды',a:'по необходимости'}],
    steps:['Смешать яйца, соль, сахар, тёплое молоко и муку до однородности.','Влить кипяток тонкой струйкой, непрерывно мешая.','Добавить масло, перемешать.','Выпекать тонкими блинчиками на разогретой сковороде.'] },

  { id:'oladyi', emoji:'🫓', title:'Оладьи на кефире', meta:'20 штук', yield:'на 20 оладий', tags:['breakfast'],
    note:'Тесто отлично подходит и для вафель — просто залей в вафельницу!',
    ingredients:[{n:'Кефир',a:'500 мл'},{n:'Вода',a:'80 мл'},{n:'Сахар',a:'100 г'},{n:'Соль',a:'1 ч. л.'},{n:'Лимонная кислота',a:'на кончике ножа'},{n:'Яйца',a:'2 шт'},{n:'Мука',a:'420–440 г'},{n:'Сода',a:'1 ч. л.'},{n:'Жир для жарки',a:'по необходимости'}],
    steps:['Налить кефир и воду, добавить сахар, соль, лимонную кислоту. Слегка прогреть до растворения.','Яйца взбить вилкой.','В муку влить кефирную смесь, добавить яйца, перемешать.','Добавить соду, недолго мешать. Оставить на 15–20 мин.','Жарить на масле слоем 1 см по 4 штуки, на среднем огне, под крышкой.','Перевернуть, дожарить. Выложить на бумажное полотенце.'] },

  { id:'tvorog-oladyi', emoji:'🍳', title:'Творожные оладьи', meta:'быстро', yield:'небольшая порция', tags:['breakfast'],
    note:'Консистенция теста — как сметана.',
    ingredients:[{n:'Творог',a:'150 г'},{n:'Яйцо',a:'1 шт'},{n:'Молоко',a:'50 г'},{n:'Мука',a:'80–100 г'},{n:'Разрыхлитель',a:'⅔ ч. л.'},{n:'Соль и сахар',a:'по вкусу'}],
    steps:['Смешать все ингредиенты.','Дать постоять 20 мин.','Жарить на средне-горячей сковороде под крышкой.'] },

  { id:'syrniki', emoji:'🧀', title:'Сырники', meta:'классические', yield:'~8–10 штук', tags:['breakfast'],
    ingredients:[{n:'Творог 9%',a:'500 г'},{n:'Яйцо',a:'1 шт'},{n:'Желток',a:'1 шт'},{n:'Сахар',a:'30 г'},{n:'Соль',a:'¼ ч. л.'},{n:'Мука в тесто',a:'не более 1 ст. л.'},{n:'Мука для обваливания',a:'по необходимости'},{n:'Топлёное масло',a:'для жарки'}],
    steps:['Творог отвесить на 3–4 часа. Протереть через сито или размять.','Смешать с яйцом, желтком, сахаром, солью. Добавить муку если нужно.','Разделить на порции 60 г, сформовать в муке — сначала шарик, затем приплюснуть.','Жарить на топлёном масле на среднем огне с двух сторон до румяной корочки.','Выложить на бумажное полотенце.'] },

  { id:'shakshuka', emoji:'🍳', title:'Шакшука', meta:'Израиль · 30 мин', yield:'2–3 порции', tags:['breakfast'],
    ingredients:[{n:'Яйца',a:'4 шт'},{n:'Болгарский перец красный',a:'2 шт'},{n:'Лук',a:'1 большая'},{n:'Чеснок',a:'2 зубчика'},{n:'Перец чили',a:'по желанию'},{n:'Помидоры в собственном соку',a:'2 банки × 400 г'},{n:'Кумин молотый',a:'½ ч. л.'},{n:'Кориандр молотый',a:'½ ч. л.'},{n:'Шафран',a:'щепотка, по желанию'},{n:'Паприка копчёная',a:'щедрая щепотка'},{n:'Сахар',a:'щепотка'},{n:'Фета или брынза',a:'100 г, по желанию'},{n:'Петрушка, кинза, йогурт',a:'для подачи'},{n:'Оливковое масло',a:'~4 ст. л.'}],
    steps:['Лук — полукольца, перец — полоски 1 см, чеснок порубить.','Обжарить лук, чеснок, перец со специями 3–5 мин на оливковом масле.','Влить помидоры, добавить соль и сахар, тушить без крышки 15–20 мин до густоты.','Сделать 4 углубления, разбить яйца. Готовить до схватывания белка (желток — жидким!).','Посыпать фетой, зеленью, подать с йогуртом и хлебом.'] },

  { id:'deruny', emoji:'🥔', title:'Деруны', meta:'картофельные оладьи', yield:'~12–14 штук', tags:['breakfast'],
    ingredients:[{n:'Картофель',a:'700–800 г'},{n:'Лук',a:'100 г'},{n:'Сметана',a:'1 ст. л.'},{n:'Яйцо',a:'1 шт'},{n:'Мука',a:'50 г'},{n:'Чеснок',a:'1 зубчик, по желанию'},{n:'Соль',a:'½ ч. л.'},{n:'Сода',a:'щепотка'},{n:'Перец',a:'по вкусу'},{n:'Топлёное масло',a:'50–100 г'}],
    steps:['Картофель и лук нарезать кубиками, измельчить в комбайне с солью и содой. Оставить 10–15 мин, слить жидкость.','Добавить муку, яйцо, сметану, поперчить. Пробить блендером до однородности.','Жарить ложкой на топлёном масле 3–4 мин с каждой стороны до золотистого цвета.','Подавать со сметаной.'] },

  { id:'waffles-grain', emoji:'🫘', title:'Цельнозерновые вафли к завтраку', meta:'правильные', yield:'порция вафель', tags:['breakfast'],
    note:'Нет вафельницы? Пеки из этого теста оладьи!',
    ingredients:[{n:'Цельнозерновая мука',a:'90 г'},{n:'Кукурузный крахмал',a:'25 г'},{n:'Разрыхлитель',a:'½ ч. л.'},{n:'Сода',a:'1 ч. л.'},{n:'Соль',a:'¼ ч. л.'},{n:'Сахар',a:'1 ч. л.'},{n:'Молоко 3,2%',a:'240–300 г'},{n:'Яйцо С1',a:'1 шт'},{n:'Растительное масло',a:'45 г'},{n:'Ванильный экстракт',a:'1 ст. л.'},{n:'Яблочный или рисовый уксус',a:'1 ст. л.'}],
    steps:['Разогреть вафельницу.','Смешать муку, крахмал, разрыхлитель, соду, соль и сахар.','Смешать молоко, яйцо, масло и ванильный экстракт.','Влить жидкое в сухое, перемешать. При необходимости долить молока — тесто как на блины.','В готовое тесто влить уксус, быстро перемешать и сразу печь.','Выпекать 4–5 мин до тёмно-золотистого цвета. Выкладывать на решётку.'] },

  // ═══ СУПЫ ═══
  { id:'veggie-soup', emoji:'🥣', title:'Идеальный овощной суп', meta:'простой · 40 мин', yield:'4–5 порций', tags:['soup'],
    ingredients:[{n:'Лук',a:'1 шт'},{n:'Морковь крупная',a:'1 шт'},{n:'Болгарский перец красный',a:'1 шт'},{n:'Цукини',a:'1 средний'},{n:'Картофель',a:'2 крупных'},{n:'Брокколи',a:'1 маленькая головка'},{n:'Чеснок',a:'2 зубчика'},{n:'Горошек замороженный',a:'150 г'},{n:'Оливковое масло',a:'3 ст. л.'},{n:'Соль, зелень',a:'по вкусу'}],
    steps:['Лук, чеснок, морковь, перец — кубиком. Картофель, цукини — кубиком. Брокколи — мелкие соцветия.','Обжарить лук, чеснок, морковь и перец на оливковом масле 5–7 мин.','Влить 2 л воды, ½ ч. л. соли. Добавить картофель, варить 12 мин.','Добавить цукини, брокколи и горошек, готовить 5 мин на малом огне.','Снять с огня, всыпать зелень, накрыть крышкой на 10 мин.'] },

  { id:'borscht', emoji:'🫕', title:'Борщ', meta:'настоящий · 4–5 часов', yield:'большая кастрюля', tags:['soup'],
    note:'Варю в 2 этапа: вечер 1 — бульон, вечер 2 — пассеровка и сборка. Борщ с лёгкой хрустинкой капусты и свёклы, без сметаны, зато с салом и чёрным хлебом.',
    ingredients:[{n:'Говядина на кости',a:'1 кг'},{n:'Вода',a:'4 литра'},{n:'Корнеплоды (микс)',a:'400 г'},{n:'Свёкла',a:'2 крупных'},{n:'Картофель',a:'4 шт'},{n:'Капуста',a:'½ кочана'},{n:'Болгарский перец',a:'2 шт'},{n:'Морковь',a:'2 шт'},{n:'Чеснок',a:'3 зубчика'},{n:'Лук',a:'1 крупный'},{n:'Помидоры в собственном соку',a:'2 банки'},{n:'Томатная паста',a:'3 ч. л.'},{n:'Красный винный уксус',a:'3 ст. л.'},{n:'Сахар',a:'1 ч. л.'},{n:'Лавровый лист, душистый перец',a:'по вкусу'},{n:'Соль, зелень',a:'по вкусу'}],

    ingredients:[{n:'Фарш свиной + говяжий',a:'500 г'},{n:'Рис басмати',a:'70 г'},{n:'Болгарские перцы маленькие',a:'5 шт'},{n:'Цукини крупный',a:'1 шт'},{n:'Морковь',a:'2 шт'},{n:'Сельдерей',a:'2 стебля'},{n:'Лук',a:'1 шт'},{n:'Чеснок',a:'2 зубчика'},{n:'Помидоры в собственном соку',a:'400 мл'},{n:'Белый винный уксус',a:'2 ст. л.'},{n:'Оливковое масло',a:'4 ст. л.'}],
    steps:['Рис варить 7 мин, слить воду, остудить.','Морковь, сельдерей, лук, чеснок и стебли петрушки пробить в блендере до крупной крошки. Треть добавить в фарш.','К оставшимся овощам добавить помидоры, уксус, масло, соль и перец — пробить. Это соус.','В фарш добавить рис, соль и перец.','Перцы разрезать вдоль, удалить семена. Цукини нарезать на шайбы 5 см, вынуть мякоть. Нафаршировать.','Выложить в сковороду, смазать соусом, налить 100 мл воды. Тушить под крышкой 1,5 часа на малом огне (или духовка 180°С).'] },

  { id:'bolognese-lasagne', emoji:'🍝', title:'Лазанья болоньезе', meta:'Италия · 200°С · 35–40 мин', yield:'форма 30×20 см', tags:['meat','pasta'],

  { id:'golubcy', emoji:'🥬', title:'Голубцы с индейкой и диким рисом', meta:'40 мин тушения', yield:'~12 штук', tags:['meat'],

// ═══ LOGIC ═══
let currentFilter = 'all';
let searchQuery = '';

function getFiltered() {
  let list = recipes.filter(r => !r.hidden);
  if (currentFilter !== 'all') list = list.filter(r => r.tags.includes(currentFilter));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r => {
      const haystack = [r.title, r.meta, r.yield, r.note||'',
        ...(r.ingredients||[]).map(i => i.n),
        ...(r.steps||[])
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }
  return list;
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const list = getFiltered();
  document.getElementById('count-label').textContent = list.length + ' рецептов';

  if (!list.length) {
    grid.innerHTML = '<div class="no-results">🍽️ Ничего не найдено</div>';
    return;
  }

  list.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'recipe-card';
    btn.innerHTML =
      '<span class="card-emoji">' + r.emoji + '</span>' +
      '<div class="card-info"><div class="card-name">' + r.title + '</div>' +
      '<div class="card-meta">' + r.meta + '</div></div>' +
      '<span class="card-arrow">›</span>';
    btn.onclick = () => openRecipe(r.id);
    grid.appendChild(btn);
  });

  grid.classList.remove('stagger');
  void grid.offsetWidth;
  grid.classList.add('stagger');
}

function filterCards(tag, e) {
  currentFilter = tag;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  renderCards();
}

function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  // reset filter to all when searching
  if (searchQuery) {
    currentFilter = 'all';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.tab').classList.add('active');
  }
  renderCards();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').style.display = 'none';
  renderCards();
}

function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-yield').textContent = r.yield;
  document.getElementById('r-note-wrap').innerHTML = r.note ? '<div class="note-box">💡 ' + r.note + '</div>' : '';

  const ing = document.getElementById('r-ingredients');
  ing.innerHTML = (r.ingredients||[]).map(i => {
    if (i.n.startsWith('—')) return '<div class="ingredient-divider">' + i.n.replace(/^—\s*/, '') + '</div>';
    return '<div class="ingredient-item"><span class="ingredient-name">' + i.n + '</span><span class="ingredient-amount">' + i.a + '</span></div>';
  }).join('');

  const steps = document.getElementById('r-steps');
  steps.innerHTML = (r.steps||[]).map((s,i) =>
    '<div class="step-item"><div class="step-num">' + (i+1) + '</div><div class="step-text">' + s + '</div></div>'
  ).join('');

  document.getElementById('home').style.display = 'none';
  const screen = document.getElementById('recipe-screen');
  screen.style.display = 'flex';
  screen.classList.add('fade-in');
  window.scrollTo(0, 0);

  ['r-ingredients','r-steps'].forEach(elId => {
    const el = document.getElementById(elId);
    el.classList.remove('stagger');
    void el.offsetWidth;
    el.classList.add('stagger');
  });
}

function goBack() {
  document.getElementById('recipe-screen').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  window.scrollTo(0, 0);
}

renderCards();
</script>

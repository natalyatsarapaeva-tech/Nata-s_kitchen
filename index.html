<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Мои рецепты">
  <title>Мои рецепты</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#fdf6ec; --warm:#f5e6d0; --brown:#5c3d2e;
      --brown-light:#8b6355; --amber:#d4843a; --amber-light:#e8a85f;
      --text:#2e1f14; --text-soft:#7a5c4a; --white:#fff;
      --shadow:rgba(92,61,46,0.15); --red:#c0392b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* ── LOADING ── */
    #loading{position:fixed;inset:0;background:var(--brown);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
    .loading-emoji{font-size:64px;animation:pulse 1.2s ease infinite;}
    .loading-text{color:var(--cream);font-family:'Playfair Display',serif;font-size:24px;margin-top:16px;}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

    /* ── HOME ── */
    #home{display:none;flex-direction:column;min-height:100vh;}
    .home-header{background:var(--brown);padding:56px 24px 32px;position:relative;overflow:hidden;}
    .home-header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--amber);opacity:.15;}
    .home-header::after{content:'';position:absolute;bottom:-40px;left:-40px;width:140px;height:140px;border-radius:50%;background:var(--amber-light);opacity:.12;}
    .home-title{font-family:'Playfair Display',serif;font-size:34px;color:var(--cream);line-height:1.2;position:relative;z-index:1;}
    .home-title em{color:var(--amber-light);font-style:italic;}
    .home-subtitle{color:var(--warm);font-size:13px;font-weight:300;margin-top:6px;letter-spacing:.05em;position:relative;z-index:1;}

    .search-wrap{padding:16px 20px 4px;}
    .search-wrap-inner{position:relative;}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
    .search-box{width:100%;padding:12px 40px 12px 42px;border-radius:14px;border:2px solid var(--warm);background:var(--white);font-family:'Lato',sans-serif;font-size:15px;color:var(--text);outline:none;}
    .search-box:focus{border-color:var(--amber);}
    .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:var(--text-soft);cursor:pointer;display:none;padding:4px;}

    .filter-tabs{display:flex;gap:8px;padding:14px 20px 4px;overflow-x:auto;scrollbar-width:none;}
    .filter-tabs::-webkit-scrollbar{display:none;}
    .tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;border:2px solid var(--warm);background:transparent;color:var(--text-soft);transition:all .2s;white-space:nowrap;}
    .tab.active{background:var(--brown);color:var(--cream);border-color:var(--brown);}

    .cards-grid{padding:14px 20px 100px;display:flex;flex-direction:column;gap:12px;flex:1;}
    .no-results{text-align:center;padding:40px 20px;color:var(--text-soft);font-size:15px;}

    .recipe-card{background:var(--white);border-radius:18px;padding:18px 18px 18px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 16px var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;border:none;width:100%;text-align:left;}
    .recipe-card:active{transform:scale(.98);}
    .recipe-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:var(--amber);border-radius:18px 0 0 18px;}
    .card-emoji{font-size:42px;line-height:1;flex-shrink:0;}
    .card-info{flex:1;min-width:0;}
    .card-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--brown);font-weight:700;line-height:1.2;}
    .card-meta{font-size:12px;color:var(--text-soft);margin-top:3px;font-weight:300;}
    .card-arrow{color:var(--amber);font-size:18px;flex-shrink:0;}

    /* ── FAB (добавить) ── */
    .fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--amber);color:var(--white);font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(212,132,58,.5);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .2s;}
    .fab:active{transform:scale(.92);}

    /* ── RECIPE SCREEN ── */
    #recipe-screen{display:none;min-height:100vh;flex-direction:column;}
    .recipe-header{background:var(--brown);padding:52px 24px 28px;}
    .back-btn{display:flex;align-items:center;gap:8px;color:var(--amber-light);font-size:14px;cursor:pointer;background:none;border:none;padding:0;margin-bottom:18px;font-family:'Lato',sans-serif;}
    .recipe-header-actions{display:flex;justify-content:space-between;align-items:flex-start;}
    .recipe-emoji-big{font-size:56px;display:block;margin-bottom:10px;}
    .recipe-title-big{font-family:'Playfair Display',serif;font-size:28px;color:var(--cream);line-height:1.2;}
    .recipe-yield{font-size:12px;color:var(--amber-light);margin-top:5px;font-weight:300;letter-spacing:.08em;text-transform:uppercase;}
    .edit-btn{background:rgba(255,255,255,.15);border:none;color:var(--cream);padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Lato',sans-serif;white-space:nowrap;flex-shrink:0;}

    .recipe-body{padding:24px 20px;flex:1;}
    .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--amber);font-weight:700;margin-bottom:12px;}
    .ingredients-box{background:var(--white);border-radius:14px;padding:18px;margin-bottom:24px;box-shadow:0 2px 10px var(--shadow);}
    .ingredient-item{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--warm);font-size:14px;gap:8px;}
    .ingredient-item:last-child{border-bottom:none;}
    .ingredient-name{color:var(--text);font-weight:400;flex:1;}
    .ingredient-amount{color:var(--brown-light);font-weight:700;font-size:13px;text-align:right;}
    .ingredient-divider{padding:10px 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);font-weight:700;border-bottom:1px solid var(--warm);}
    .steps-list{display:flex;flex-direction:column;gap:12px;margin-bottom:40px;}
    .step-item{background:var(--white);border-radius:14px;padding:16px;box-shadow:0 2px 10px var(--shadow);display:flex;gap:12px;align-items:flex-start;}
    .step-num{background:var(--amber);color:var(--white);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
    .step-text{font-size:14px;line-height:1.65;color:var(--text);}
    .note-box{background:var(--warm);border-radius:12px;padding:12px 14px;margin-bottom:20px;font-size:13px;line-height:1.6;color:var(--brown);border-left:4px solid var(--amber);}
    .delete-recipe-btn{margin:0 20px 40px;padding:14px;background:none;border:2px solid #e74c3c;color:#e74c3c;border-radius:14px;width:calc(100% - 40px);font-size:15px;cursor:pointer;font-family:'Lato',sans-serif;}

    /* ── EDITOR SCREEN ── */
    #editor-screen{display:none;min-height:100vh;flex-direction:column;}
    .editor-header{background:var(--brown);padding:52px 24px 28px;display:flex;align-items:center;gap:16px;}
    .editor-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--cream);}
    .editor-body{padding:20px;flex:1;}

    .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--amber);font-weight:700;margin-bottom:8px;display:block;}
    .field-input{width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--warm);background:var(--white);font-family:'Lato',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:18px;}
    .field-input:focus{border-color:var(--amber);}
    textarea.field-input{resize:vertical;min-height:80px;}

    .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .emoji-btn{font-size:28px;padding:8px;border-radius:10px;border:2px solid var(--warm);background:var(--white);cursor:pointer;}
    .emoji-btn.selected{border-color:var(--amber);background:var(--warm);}

    .tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .tag-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;border:2px solid var(--warm);background:transparent;color:var(--text-soft);}
    .tag-btn.selected{background:var(--brown);color:var(--cream);border-color:var(--brown);}

    .ing-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
    .ing-row{display:flex;gap:8px;align-items:center;}
    .ing-row input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid var(--warm);background:var(--white);font-family:'Lato',sans-serif;font-size:14px;color:var(--text);outline:none;}
    .ing-row input:focus{border-color:var(--amber);}
    .ing-del{background:none;border:none;font-size:20px;color:var(--text-soft);cursor:pointer;flex-shrink:0;padding:4px;}

    .steps-edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
    .step-row{display:flex;gap:8px;align-items:flex-start;}
    .step-num-edit{background:var(--amber);color:var(--white);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:8px;}
    .step-row textarea{flex:1;padding:10px 12px;border-radius:10px;border:2px solid var(--warm);background:var(--white);font-family:'Lato',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:60px;}
    .step-row textarea:focus{border-color:var(--amber);}

    .add-row-btn{width:100%;padding:12px;border-radius:12px;border:2px dashed var(--amber);background:transparent;color:var(--amber);font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;margin-bottom:18px;}
    .save-btn{width:100%;padding:16px;border-radius:14px;background:var(--brown);color:var(--cream);font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:'Lato',sans-serif;margin-bottom:40px;}
    .save-btn:disabled{opacity:.5;}

    /* ── FAB GROUP ── */
    .fab-group{position:fixed;bottom:28px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:100;}
    .fab-camera{width:48px;height:48px;border-radius:50%;background:var(--amber-light);color:var(--white);font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(212,132,58,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
    .fab-camera:active{transform:scale(.92);}

    /* ── ANIM ── */
    .fade-in{animation:fadeIn .3s ease both;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeIn .35s ease both;}
    .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.07s}.stagger>*:nth-child(3){animation-delay:.11s}
    .stagger>*:nth-child(4){animation-delay:.15s}.stagger>*:nth-child(5){animation-delay:.19s}.stagger>*:nth-child(6){animation-delay:.23s}
    .stagger>*:nth-child(7){animation-delay:.27s}.stagger>*:nth-child(8){animation-delay:.31s}.stagger>*:nth-child(9){animation-delay:.35s}
    .stagger>*:nth-child(10){animation-delay:.39s}.stagger>*:nth-child(11){animation-delay:.43s}.stagger>*:nth-child(12){animation-delay:.47s}
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-emoji">🍽️</div>
  <div class="loading-text">Загружаю рецепты…</div>
</div>

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <div class="home-title">Моя кухня<br><em>любимое</em></div>
    <div class="home-subtitle" id="count-label">загрузка…</div>
  </div>
  <div class="search-wrap">
    <div class="search-wrap-inner">
      <span class="search-icon">🔍</span>
      <input class="search-box" type="text" placeholder="Ингредиент или блюдо…" id="search-input" oninput="onSearch()"/>
      <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
    </div>
  </div>
  <div class="filter-tabs" id="filter-tabs">
    <button class="tab active" onclick="filterCards('all',event)">Все</button>
    <button class="tab" onclick="filterCards('breakfast',event)">🌅 Завтраки</button>
    <button class="tab" onclick="filterCards('soup',event)">🍲 Супы</button>
    <button class="tab" onclick="filterCards('salad',event)">🥗 Салаты</button>
    <button class="tab" onclick="filterCards('veggie',event)">🥦 Овощи</button>
    <button class="tab" onclick="filterCards('meat',event)">🥩 Мясо</button>
    <button class="tab" onclick="filterCards('chicken',event)">🍗 Курица</button>
    <button class="tab" onclick="filterCards('fish',event)">🐟 Рыба</button>
    <button class="tab" onclick="filterCards('pasta',event)">🍝 Паста</button>
    <button class="tab" onclick="filterCards('baking',event)">🧁 Выпечка</button>
    <button class="tab" onclick="filterCards('dessert',event)">🍮 Десерты</button>
    <button class="tab" onclick="filterCards('icecream',event)">🍦 Мороженое</button>
  </div>
  <div class="cards-grid stagger" id="cards-grid"></div>
  <div class="fab-group">
    <a class="fab-camera" href="add-recipe.html" title="Добавить рецепт по фото">📸</a>
    <button class="fab" onclick="openEditor(null)" title="Добавить рецепт вручную">+</button>
  </div>
</div>

<!-- RECIPE DETAIL -->
<div id="recipe-screen">
  <div class="recipe-header">
    <button class="back-btn" onclick="goHome()">← Все рецепты</button>
    <div class="recipe-header-actions">
      <div>
        <span class="recipe-emoji-big" id="r-emoji"></span>
        <div class="recipe-title-big" id="r-title"></div>
        <div class="recipe-yield" id="r-yield"></div>
      </div>
      <button class="edit-btn" onclick="openEditor(currentRecipe)">✏️ Изменить</button>
    </div>
  </div>
  <div class="recipe-body">
    <div id="r-note-wrap"></div>
    <div class="section-label">Ингредиенты</div>
    <div class="ingredients-box stagger" id="r-ingredients"></div>
    <div class="section-label">Приготовление</div>
    <div class="steps-list stagger" id="r-steps"></div>
  </div>
  <button class="delete-recipe-btn" onclick="deleteRecipe()">🗑 Удалить рецепт</button>
</div>

<!-- EDITOR -->
<div id="editor-screen">
  <div class="editor-header">
    <button class="back-btn" onclick="closeEditor()" style="margin:0;">←</button>
    <div class="editor-title" id="editor-title">Новый рецепт</div>
  </div>
  <div class="editor-body">
    <label class="field-label">Эмодзи</label>
    <div class="emoji-row" id="emoji-row"></div>

    <label class="field-label">Название</label>
    <input class="field-input" id="e-title" placeholder="Например: Тыквенный суп"/>

    <label class="field-label">Категория</label>
    <div class="tags-row" id="tags-row"></div>

    <label class="field-label">Краткое описание (время, выход)</label>
    <input class="field-input" id="e-meta" placeholder="~30 мин · 4 порции"/>

    <label class="field-label">Выход / количество порций</label>
    <input class="field-input" id="e-yield" placeholder="4 порции"/>

    <label class="field-label">Заметка (опционально)</label>
    <textarea class="field-input" id="e-note" placeholder="Совет, лайфхак…"></textarea>

    <label class="field-label">Ингредиенты</label>
    <div class="ing-list" id="ing-list"></div>
    <button class="add-row-btn" onclick="addIngredient()">+ Добавить ингредиент</button>

    <label class="field-label">Шаги приготовления</label>
    <div class="steps-edit-list" id="steps-list"></div>
    <button class="add-row-btn" onclick="addStep()">+ Добавить шаг</button>

    <button class="save-btn" id="save-btn" onclick="saveRecipe()">💾 Сохранить рецепт</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1uWPrp12lvpyBzXCOq9IrMuTU4uOTRao",
  authDomain: "natas-kitchen.firebaseapp.com",
  projectId: "natas-kitchen",
  storageBucket: "natas-kitchen.firebasestorage.app",
  messagingSenderId: "756908196325",
  appId: "1:756908196325:web:0ca8d4e6f853c1cb436f0c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── STATE ──
let allRecipes = [];
let currentFilter = 'all';
let searchQuery = '';
window.currentRecipe = null;
let editingId = null;
let selectedEmoji = '🍽️';
let selectedTags = [];

const EMOJIS = ['🍳','🥞','🧇','🫓','🧁','🎂','🍰','🥧','🍋','🍯','🍓','🫐','🍅','🥕','🥦','🍆','🫑','🥔','🧀','🐟','🍗','🥩','🫕','🍝','🍛','🍜','🫙','🥗','🍲','🍮','🍦','🫧','🌿','🔥','🥢'];
const TAGS = [
  {id:'breakfast',label:'🌅 Завтраки'},
  {id:'soup',label:'🍲 Супы'},
  {id:'salad',label:'🥗 Салаты'},
  {id:'veggie',label:'🥦 Овощи'},
  {id:'meat',label:'🥩 Мясо'},
  {id:'chicken',label:'🍗 Курица'},
  {id:'fish',label:'🐟 Рыба'},
  {id:'pasta',label:'🍝 Паста'},
  {id:'baking',label:'🧁 Выпечка'},
  {id:'dessert',label:'🍮 Десерты'},
  {id:'icecream',label:'🍦 Мороженое'},
];

// ── LOAD ──
async function loadRecipes() {
  const snap = await getDocs(collection(db, 'recipes'));
  allRecipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
  allRecipes.sort((a,b) => a.title.localeCompare(b.title, 'ru'));
  document.getElementById('loading').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  renderCards();
}
loadRecipes().catch(e => {
  document.getElementById('loading').innerHTML = '<div style="color:#e8a85f;font-size:18px;padding:20px;text-align:center;">Ошибка загрузки 😢<br><small>' + e.message + '</small></div>';
});

// ── RENDER CARDS ──
function getFiltered() {
  let list = allRecipes;
  if (currentFilter !== 'all') list = list.filter(r => (r.tags||[]).includes(currentFilter));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r => {
      const hay = [r.title, r.meta, r.yield, r.note||'',
        ...(r.ingredients||[]).map(i=>i.n||''),
        ...(r.steps||[])
      ].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  return list;
}

window.renderCards = function() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const list = getFiltered();
  document.getElementById('count-label').textContent = list.length + ' рецептов';
  if (!list.length) { grid.innerHTML = '<div class="no-results">🍽️ Ничего не найдено</div>'; return; }
  list.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'recipe-card';
    btn.innerHTML = '<span class="card-emoji">' + (r.emoji||'🍽️') + '</span>' +
      '<div class="card-info"><div class="card-name">' + r.title + '</div>' +
      '<div class="card-meta">' + (r.meta||'') + '</div></div>' +
      '<span class="card-arrow">›</span>';
    btn.onclick = () => openRecipe(r);
    grid.appendChild(btn);
  });
  grid.classList.remove('stagger'); void grid.offsetWidth; grid.classList.add('stagger');
}

window.filterCards = function(tag, e) {
  currentFilter = tag;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  renderCards();
}

window.onSearch = function() {
  searchQuery = document.getElementById('search-input').value.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  if (searchQuery) {
    currentFilter = 'all';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.tab').classList.add('active');
  }
  renderCards();
}

window.clearSearch = function() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').style.display = 'none';
  renderCards();
}

// ── RECIPE DETAIL ──
function openRecipe(r) {
  window.currentRecipe = r;
  document.getElementById('r-emoji').textContent = r.emoji || '🍽️';
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-yield').textContent = r.yield || '';
  document.getElementById('r-note-wrap').innerHTML = r.note ? '<div class="note-box">💡 ' + r.note + '</div>' : '';

  const ing = document.getElementById('r-ingredients');
  ing.innerHTML = (r.ingredients||[]).map(i => {
    if ((i.n||'').startsWith('—')) return '<div class="ingredient-divider">' + i.n.replace(/^—\s*/,'') + '</div>';
    return '<div class="ingredient-item"><span class="ingredient-name">' + i.n + '</span><span class="ingredient-amount">' + i.a + '</span></div>';
  }).join('');

  const steps = document.getElementById('r-steps');
  steps.innerHTML = (r.steps||[]).map((s,i) =>
    '<div class="step-item"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>'
  ).join('');

  show('recipe-screen');
  window.scrollTo(0,0);
  ['r-ingredients','r-steps'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('stagger');void el.offsetWidth;el.classList.add('stagger');});
}

window.deleteRecipe = async function() {
  if (!window.currentRecipe) return;
  if (!confirm('Удалить «' + window.currentRecipe.title + '»? Это нельзя отменить.')) return;
  await deleteDoc(doc(db, 'recipes', window.currentRecipe.id));
  allRecipes = allRecipes.filter(r => r.id !== window.currentRecipe.id);
  window.currentRecipe = null;
  goHome();
}

// ── EDITOR ──
window.openEditor = function(recipe) {
  editingId = recipe ? recipe.id : null;
  document.getElementById('editor-title').textContent = recipe ? 'Редактировать' : 'Новый рецепт';
  selectedEmoji = recipe ? (recipe.emoji || '🍽️') : '🍽️';
  selectedTags = recipe ? [...(recipe.tags||[])] : [];

  document.getElementById('e-title').value = recipe ? recipe.title : '';
  document.getElementById('e-meta').value = recipe ? (recipe.meta||'') : '';
  document.getElementById('e-yield').value = recipe ? (recipe.yield||'') : '';
  document.getElementById('e-note').value = recipe ? (recipe.note||'') : '';

  // Emoji picker
  const er = document.getElementById('emoji-row');
  er.innerHTML = EMOJIS.map(e =>
    '<button class="emoji-btn'+(e===selectedEmoji?' selected':'')+'" onclick="selectEmoji(\''+e+'\')" type="button">'+e+'</button>'
  ).join('');

  // Tags
  const tr = document.getElementById('tags-row');
  tr.innerHTML = TAGS.map(t =>
    '<button class="tag-btn'+(selectedTags.includes(t.id)?' selected':'')+'" onclick="toggleTag(\''+t.id+'\')" type="button">'+t.label+'</button>'
  ).join('');

  // Ingredients
  const il = document.getElementById('ing-list');
  il.innerHTML = '';
  (recipe ? (recipe.ingredients||[]) : []).forEach(i => addIngredientRow(i.n, i.a));
  if (!recipe || !(recipe.ingredients||[]).length) addIngredientRow('','');

  // Steps
  const sl = document.getElementById('steps-list');
  sl.innerHTML = '';
  (recipe ? (recipe.steps||[]) : []).forEach(s => addStepRow(s));
  if (!recipe || !(recipe.steps||[]).length) addStepRow('');

  show('editor-screen');
  window.scrollTo(0,0);
}

window.selectEmoji = function(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.textContent===e));
}

window.toggleTag = function(id) {
  if (selectedTags.includes(id)) selectedTags = selectedTags.filter(t=>t!==id);
  else selectedTags.push(id);
  document.querySelectorAll('.tag-btn').forEach(b => {
    const tid = TAGS.find(t=>t.label===b.textContent)?.id;
    if (tid) b.classList.toggle('selected', selectedTags.includes(tid));
  });
}

function addIngredientRow(name='', amount='') {
  const il = document.getElementById('ing-list');
  const row = document.createElement('div');
  row.className = 'ing-row';
  row.innerHTML = '<input placeholder="Ингредиент" value="'+escHtml(name)+'"/>' +
    '<input placeholder="Кол-во" style="max-width:110px" value="'+escHtml(amount)+'"/>' +
    '<button class="ing-del" onclick="this.parentElement.remove()" type="button">×</button>';
  il.appendChild(row);
}
window.addIngredient = () => addIngredientRow('','');

function addStepRow(text='') {
  const sl = document.getElementById('steps-list');
  const idx = sl.children.length + 1;
  const row = document.createElement('div');
  row.className = 'step-row';
  row.innerHTML = '<div class="step-num-edit">'+idx+'</div>' +
    '<textarea placeholder="Описание шага…">'+escHtml(text)+'</textarea>' +
    '<button class="ing-del" onclick="this.parentElement.remove();renumberSteps()" type="button">×</button>';
  sl.appendChild(row);
}
window.addStep = () => { addStepRow(''); renumberSteps(); }

window.renumberSteps = function() {
  document.querySelectorAll('.step-num-edit').forEach((el,i)=>el.textContent=i+1);
}

window.saveRecipe = async function() {
  const title = document.getElementById('e-title').value.trim();
  if (!title) { alert('Введи название рецепта'); return; }

  const ingredients = [...document.querySelectorAll('.ing-row')].map(row => {
    const inputs = row.querySelectorAll('input');
    return {n: inputs[0].value.trim(), a: inputs[1].value.trim()};
  }).filter(i => i.n);

  const steps = [...document.querySelectorAll('.step-row textarea')].map(t=>t.value.trim()).filter(Boolean);

  const id = editingId || title.toLowerCase().replace(/[^а-яa-z0-9]/gi,'-').replace(/-+/g,'-') + '-' + Date.now();

  const recipe = {
    id, emoji: selectedEmoji, title,
    meta: document.getElementById('e-meta').value.trim(),
    yield: document.getElementById('e-yield').value.trim(),
    note: document.getElementById('e-note').value.trim(),
    tags: selectedTags, ingredients, steps
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Сохраняю…';

  try {
    await setDoc(doc(db, 'recipes', id), recipe);
    const idx = allRecipes.findIndex(r=>r.id===id);
    if (idx>=0) allRecipes[idx] = recipe; else allRecipes.push(recipe);
    allRecipes.sort((a,b)=>a.title.localeCompare(b.title,'ru'));
    btn.disabled = false; btn.textContent = '💾 Сохранить рецепт';
    closeEditor();
    openRecipe(recipe);
  } catch(e) {
    btn.disabled = false; btn.textContent = '💾 Сохранить рецепт';
    alert('Ошибка: ' + e.message);
  }
}

window.closeEditor = function() {
  if (window.currentRecipe) show('recipe-screen');
  else goHome();
}

window.goHome = function() {
  window.currentRecipe = null;
  renderCards();
  show('home');
  window.scrollTo(0,0);
}

function show(id) {
  ['loading','home','recipe-screen','editor-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = (s===id) ? 'flex' : 'none';
  });
  if (id==='home') document.getElementById('home').style.display='flex';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
